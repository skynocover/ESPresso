[env:waveshare-s3-amoled]
; pioarduino 社群 platform：提供 arduino-esp32 core 3.x
; (官方 espressif32@6.x 只到 core 2.0.x，缺 esp32-hal-periman.h，Arduino_GFX 的 SH8601 驅動編不過)
;
; 釘在 53.03.13 = arduino-esp32 core 3.1.3：
; core 3.2.0+ 的新 I2C 驅動有回歸 bug，i2c_master_transmit 每次回 ESP_ERR_INVALID_STATE
; (espressif/arduino-esp32 #11949 #11351)，導致寫不進 TCA9554 → 顯示電源開不了。
; 3.1.3 是最後一個 I2C 正常運作的版本。
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Serial / USB ---
monitor_speed = 115200
upload_speed = 921600
; 鎖定 USB 埠,避免 macOS 誤選到藍牙埠 (/dev/cu.Bluetooth-Incoming-Port)
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

; --- Memory: 對應 Waveshare ESP32-S3R8 + N16R8 (16MB Flash + 8MB OPI PSRAM) ---
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; --- Build flags ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; LVGL: 讓 lvgl.h 用 include path 找 include/lv_conf.h
    ; -I include 是必要的：否則 lvgl 函式庫自身編譯時找不到 lv_conf.h
    -DLV_CONF_INCLUDE_SIMPLE
    ; 讓產生的字型檔 (font_cjk18.c) 用 "lvgl.h" 而非 "lvgl/lvgl.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include

; --- Libraries ---
; Arduino_GFX: SH8601 QSPI AMOLED 驅動 (368x448)
; lvgl 8.3: UI 框架 (Stage 1 起 include；Stage 0 先用純 Arduino_GFX 點亮)
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.0
    lvgl/lvgl @ ^8.3.0
    ; AXP2101 PMU：面板電源軌走 ALDO3，開機預設關閉，必須先開才會亮
    lewisxhe/XPowersLib @ ^0.2.7
    ; host-link 協定的 JSON 解析 (韌體端，逐行解析；忽略未知欄位)
    bblanchon/ArduinoJson @ ^7.0.0
    ; QMI8658 6 軸 IMU：朝向偵測 (朝下休眠/立起喚醒) 只用 accelerometer。
    ; 與官方 08 範例同一套 (lewisxhe SensorLib，亦即 XPowersLib 同作者)，降踩坑風險。
    lewisxhe/SensorLib @ ^0.4.1
    ; arduino-audio-driver: ES8311 codec driver (用於蕃茄鐘結束「叮叮叮」)。
    ; 直接吃 Wire (共用 0x18 I2C)，I2S 走 arduino-esp32 內建 ESP_I2S。
    https://github.com/pschatzmann/arduino-audio-driver.git